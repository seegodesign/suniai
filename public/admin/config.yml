backend:
  name: github
  repo: YOUR_GITHUB_USERNAME/suniai
  branch: main

# Uncomment the two lines below while editing locally (npm run dev)
# — remove them before deploying
# local_backend: true

media_folder: public/images
public_folder: /images

collections:
  - name: blog
    label: Blog Posts
    folder: src/content/blog
    create: true
    delete: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: string }
      - { label: Publish Date, name: pubDate, widget: datetime, format: "YYYY-MM-DD", date_format: "DD MMMM YYYY", time_format: false }
      - label: Tags
        name: tags
        widget: list
        allow_add: true
        default: []
      - { label: Draft, name: draft, widget: boolean, default: false, required: false }
      - { label: Body, name: body, widget: markdown }
