backend:
  name: github
  repo: seegodesign/suniai
  branch: main
  base_url: https://suniai.one
  auth_endpoint: /oauth

# Uncomment the two lines below while editing locally (npm run dev)
# — remove them before deploying
local_backend: true

media_folder: public/images
public_folder: /images

collections:
  - name: home
    label: Home Page
    files:
      - name: home
        label: Home Page Content
        file: src/content/home.json
        fields:
          - { label: Hero eyebrow text, name: heroEyebrow, widget: string }
          - { label: Hero heading, name: heroHeading, widget: string }
          - { label: Hero body text, name: heroBody, widget: text }
          - { label: 'CTA button 1 — label', name: heroCta1Label, widget: string }
          - { label: 'CTA button 1 — link', name: heroCta1Href, widget: string }
          - { label: 'CTA button 2 — label', name: heroCta2Label, widget: string }
          - { label: 'CTA button 2 — link', name: heroCta2Href, widget: string }
          - { label: About heading, name: aboutHeading, widget: string }
          - label: About paragraphs
            name: aboutBodies
            widget: list
            summary: '{{fields.text}}'
            field:
              label: Paragraph
              name: text
              widget: text
          - { label: Services section heading, name: servicesHeading, widget: string }
  - name: contact
    label: Pages
    files:
      - name: contact
        label: Contact Page Content
        file: src/content/contact.json
        fields:
          - { label: Page title, name: title, widget: string }
          - { label: Meta description, name: description, widget: text }
          - { label: Hero eyebrow, name: eyebrow, widget: string }
          - { label: Hero heading, name: heading, widget: string }
          - { label: Hero subheading, name: subheading, widget: text }
          - { label: Hero image, name: heroImage, widget: image }
          - { label: Form ID, name: formId, widget: string, hint: "The LeadConnector form ID from your embed code." }
          - { label: Form name, name: formName, widget: string }
          - { label: Form height, name: formHeight, widget: number, value_type: int, min: 300 }
          - { label: Iframe title, name: iframeTitle, widget: string }
      - name: services-page
        label: Services Content
        file: src/content/services-page.json
        fields:
          - { label: Page title, name: title, widget: string }
          - { label: Meta description, name: description, widget: text }
          - { label: Hero eyebrow, name: eyebrow, widget: string }
          - { label: Hero heading, name: heading, widget: string }
          - { label: Hero subheading, name: subheading, widget: text }
          - { label: Hero image, name: heroImage, widget: image }
          - { label: CTA heading, name: ctaHeading, widget: string }
          - { label: CTA body, name: ctaBody, widget: text }
          - { label: CTA button label, name: ctaLabel, widget: string }
          - { label: CTA button link, name: ctaHref, widget: string }
  - name: blog
    label: Blog Posts
    folder: src/content/blog
    create: true
    delete: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: string }
      - { label: Publish Date, name: pubDate, widget: datetime, format: "YYYY-MM-DD", date_format: "DD MMMM YYYY", time_format: false }
      - label: Tags
        name: tags
        widget: list
        allow_add: true
        default: []
      - { label: Draft, name: draft, widget: boolean, default: false, required: false }
      - { label: Hero Image, name: heroImage, widget: image, required: false, hint: "Displayed at the top of the post and in the blog listing" }
      - { label: Body, name: body, widget: markdown }

  - name: testimonials
    label: Testimonials
    folder: src/content/testimonials
    create: true
    delete: true
    slug: "{{name}}"
    extension: md
    format: frontmatter
    fields:
      - { label: Name, name: name, widget: string }
      - { label: Service, name: service, widget: select, options: ["Mentorship", "Group Workshop", "Massage Therapy", "Womb Therapy", "Online Sessions"] }
      - { label: Featured, name: featured, widget: boolean, default: false, hint: "Featured testimonials appear highlighted in dark cards" }
      - { label: Photo, name: photo, widget: image, required: false, hint: "Small circular portrait shown on the card" }
      - { label: Quote, name: body, widget: markdown, hint: "The testimonial content. Supports bold, italic, and paragraphs." }

  - name: faq
    label: FAQ
    folder: src/content/faq
    create: true
    delete: true
    slug: "{{order}}-{{slug}}"
    extension: json
    format: json
    fields:
      - { label: Question, name: question, widget: string }
      - { label: Answer, name: answer, widget: text }
      - { label: Category, name: category, widget: select, options: ["Getting Started", "Mentorship", "Massage Therapy", "Practical"] }
      - { label: Order, name: order, widget: number, default: 10, hint: "Lower numbers appear first within a category" }

  - name: services
    label: Services
    files:
      - &service_fields
        name: life-coaching
        label: Mentorship
        file: src/content/services/life-coaching.json
        fields: &fields
          - { label: Draft, name: draft, widget: boolean, default: false, required: false, hint: "When enabled, this service is hidden from the live site." }
          - { label: Title, name: title, widget: string }
          - { label: Hero Image, name: heroImage, widget: image, required: false, hint: "Upload an image for the service hero. Leave blank for a plain background." }
          - { label: Tagline, name: tagline, widget: string }
          - { label: Description heading, name: descriptionHeading, widget: string }
          - { label: Description (paragraph 1), name: description1, widget: text }
          - { label: Description (paragraph 2), name: description2, widget: text }
          - { label: Items heading, name: itemsHeading, widget: string }
          - label: Items list
            name: items
            widget: list
            field: { label: Item, name: item, widget: string }
          - { label: Who is this for?, name: whoIsThisFor, widget: text }
          - label: Session Details
            name: sessionDetails
            widget: list
            fields:
              - { label: Label, name: label, widget: string }
              - { label: Value, name: value, widget: string }
      - name: group-coaching
        label: Group Mentorship & Workshops
        file: src/content/services/group-coaching.json
        fields: *fields
      - name: massage-therapy
        label: Massage Therapy
        file: src/content/services/massage-therapy.json
        fields: *fields
      - name: womb-therapy
        label: Womb Therapy
        file: src/content/services/womb-therapy.json
        fields: *fields
      - name: online-sessions
        label: Online Sessions
        file: src/content/services/online-sessions.json
        fields: *fields
